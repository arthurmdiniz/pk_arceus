let tarefas = {};
let salvando = false;

async function carregar() {
  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('lista').innerHTML = '';

  try {
    const { data, error } = await _supabase
      .from('requests')
      .select('num, feito');

    if (error) throw error;

    tarefas = {};
    data.forEach(r => { tarefas[r.num] = r.feito; });
    localStorage.setItem('arceus_tarefas', JSON.stringify(tarefas));

    document.getElementById('loading').classList.add('hidden');
    renderizar();
    mostrarStatus('Dados carregados do Supabase!', 'success');
  } catch (err) {
    try { tarefas = JSON.parse(localStorage.getItem('arceus_tarefas') || '{}'); } catch {}
    document.getElementById('loading').classList.add('hidden');
    renderizar();
    mostrarStatus('Erro ao carregar: ' + err.message, 'error');
  }
}

async function salvar() {
  if (salvando) return;
  salvando = true;

  try {
    const upserts = Object.entries(tarefas).map(([num, feito]) => ({
      num: parseInt(num),
      feito
    }));

    const { error } = await _supabase
      .from('requests')
      .upsert(upserts, { onConflict: 'num' });

    if (error) throw error;

    localStorage.setItem('arceus_tarefas', JSON.stringify(tarefas));
    mostrarStatus('Salvo no Supabase!', 'success');
  } catch (err) {
    mostrarStatus('Erro ao salvar: ' + err.message, 'error');
  } finally {
    salvando = false;
  }
}

function toggle(num) {
  tarefas[num] = !tarefas[num];
  localStorage.setItem('arceus_tarefas', JSON.stringify(tarefas));
  const div = document.querySelector(`.request[data-num="${num}"]`);
  if (div) {
    const feito = tarefas[num];
    div.classList.toggle('done', feito);
    div.querySelector('.status').textContent = feito ? 'Feito' : 'Pendente';
    div.querySelector('.status').className = 'status ' + (feito ? 'done' : 'pending');
  }
  atualizarStats();
  salvar();
}

function atualizarStats() {
  let total = 0, done = 0;
  REQUESTS.forEach(r => { total++; if (tarefas[r.num]) done++; });
  document.getElementById('totalCount').textContent = total;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('pctCount').textContent = total ? Math.round(done / total * 100) + '%' : '0%';
}

function renderizar() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const lista = document.getElementById('lista');
  lista.innerHTML = '';

  const base = REQUESTS.filter(r => !r.daybreak);
  const daybreak = REQUESTS.filter(r => r.daybreak);

  function renderGroup(title, items) {
    const filtered = items.filter(r =>
      r.name.toLowerCase().includes(search) ||
      String(r.num).includes(search) ||
      (r.objetivo && r.objetivo.toLowerCase().includes(search))
    );
    if (filtered.length === 0) return;

    const section = document.createElement('div');
    section.className = 'section-title';
    section.textContent = title;
    lista.appendChild(section);

    filtered.forEach(r => {
      const feito = !!tarefas[r.num];
      const div = document.createElement('div');
      div.className = 'request' + (feito ? ' done' : '');
      div.dataset.num = r.num;
      div.innerHTML = `
        <div class="row1">
          <input type="checkbox" ${feito ? 'checked' : ''} data-num="${r.num}">
          <span class="num">#${r.num}</span>
          <span class="name">${r.name}</span>
          <span class="status ${feito ? 'done' : 'pending'}">${feito ? 'Feito' : 'Pendente'}</span>
          <span class="toggle-detalhes">▼</span>
        </div>
        <div class="detalhes">
          ${r.objetivo ? r.objetivo : ''}
          <div class="recompensa">${r.recompensa ? '\u{1F4B0} ' + r.recompensa : ''}</div>
        </div>
      `;
      div.querySelector('input').addEventListener('change', () => toggle(r.num));
      div.querySelector('.toggle-detalhes').addEventListener('click', (e) => {
        e.stopPropagation();
        div.classList.toggle('expandido');
        e.target.textContent = div.classList.contains('expandido') ? '\u25B2' : '\u25BC';
      });
      div.querySelector('.row1').addEventListener('click', (e) => {
        if (e.target.tagName !== 'INPUT') {
          div.querySelector('input').click();
        }
      });
      lista.appendChild(div);
    });
  }

  renderGroup('Requests Principais', base);
  renderGroup('Daybreak Update', daybreak);
  atualizarStats();
}

function mostrarStatus(msg, tipo) {
  const el = document.getElementById('saveStatus');
  el.textContent = msg;
  el.className = 'save-status ' + (tipo || '');
  if (tipo !== 'error') {
    setTimeout(() => { if (el.textContent === msg) el.textContent = ''; }, 4000);
  }
}

carregar();
